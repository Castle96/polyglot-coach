apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: polyglot-coach-storage
  namespace: polyglot-coach
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
