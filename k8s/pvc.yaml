  name: polyglot-coach-profiles
  namespace: polyglot-coach
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: polyglot-coach-curriculum
  namespace: polyglot-coach
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
